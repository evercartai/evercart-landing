<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EverCart AI - AI Shopify Store Builder That Runs Itself</title>
  <meta name="description" content="EverCart AI builds and runs autonomous Shopify stores from a single prompt. Six AI agents handle sourcing, building, marketing, and support. Real revenue. Zero overhead.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --gold: #d4af77; --gold-light: #f0d49a; --gold-dim: #a07d45; }
    * { box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #080808; }
    .serif { font-family: 'Instrument Serif', serif; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.025; pointer-events: none; }
    .grid-bg { background-image: linear-gradient(rgba(212,175,119,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(212,175,119,0.04) 1px, transparent 1px); background-size: 60px 60px; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .gold-text { background: linear-gradient(135deg, #f0d49a 0%, #d4af77 40%, #a07d45 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-blur { background: rgba(8,8,8,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.8s ease forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.15s; } .delay-2 { animation-delay: 0.3s; } .delay-3 { animation-delay: 0.45s; } .delay-4 { animation-delay: 0.6s; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
    .agent-row { opacity: 0; } .agent-row.active { animation: slideIn 0.4s ease forwards; }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    .ping { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
    .tcard { transition: transform 0.3s ease, border-color 0.3s ease; }
    .tcard:hover { transform: translateY(-4px); border-color: rgba(212,175,119,0.4) !important; }
    .btn-glow { box-shadow: 0 0 40px rgba(212,175,119,0.25); transition: box-shadow 0.3s ease, transform 0.2s ease; }
    .btn-glow:hover { box-shadow: 0 0 60px rgba(212,175,119,0.45); transform: translateY(-2px); }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #080808; } ::-webkit-scrollbar-thumb { background: #a07d45; border-radius: 4px; }
    .hero-trust-mobile { display: none; }
    @media (max-width: 768px) { .nav-links { display: none; } .hero-title { font-size: 3rem !important; } .hero-trust-desktop { display: none; } .hero-trust-mobile { display: block; } }
    nav a, button { min-height: 44px; display: inline-flex; align-items: center; }
